# llvip night — fusion method comparison
# Methods: curvelet (+ max), wavelet (+ max), ssim, fa, pca, sobel_weighted, superpixel
# Note: stored as a list to indicate both modes are intended for batch export (Phase 3 CLI).
# The GUI Load preset will pick the first mode (best). Change the combobox to p90
# manually to test the percentile rendering.

version: 1
tab: train_compare
mode: [best, p90]
show_trials: true
class: all

selection:
  datasets: []
  variance_groups:
    - no_equalization/variance_llvip_curvelet
    - no_equalization/variance_llvip_curvelet_max
    - no_equalization/variance_llvip_wavelet
    - no_equalization/variance_llvip_wavelet_max
    - no_equalization/variance_llvip_ssim_v2
    - no_equalization/variance_llvip_fa
    - no_equalization/variance_llvip_pca
    - no_equalization/variance_llvip_sobel_weighted
    - no_equalization/variance_llvip_superpixel

    - rgb_equalization/variance_llvip_curvelet
    - rgb_equalization/variance_llvip_curvelet_max
    - rgb_equalization/variance_llvip_wavelet
    - rgb_equalization/variance_llvip_wavelet_max
    - rgb_equalization/variance_llvip_ssim_v2
    - rgb_equalization/variance_llvip_fa
    - rgb_equalization/variance_llvip_pca
    - rgb_equalization/variance_llvip_sobel_weighted
    - rgb_equalization/variance_llvip_superpixel

    - th_equalization/variance_llvip_curvelet
    - th_equalization/variance_llvip_curvelet_max
    - th_equalization/variance_llvip_wavelet
    - th_equalization/variance_llvip_wavelet_max
    - th_equalization/variance_llvip_ssim_v2
    - th_equalization/variance_llvip_fa
    - th_equalization/variance_llvip_pca
    - th_equalization/variance_llvip_sobel_weighted
    - th_equalization/variance_llvip_superpixel

    - rgb_th_equalization/variance_llvip_curvelet
    - rgb_th_equalization/variance_llvip_curvelet_max
    - rgb_th_equalization/variance_llvip_wavelet
    - rgb_th_equalization/variance_llvip_wavelet_max
    - rgb_th_equalization/variance_llvip_ssim_v2
    - rgb_th_equalization/variance_llvip_fa
    - rgb_th_equalization/variance_llvip_pca
    - rgb_th_equalization/variance_llvip_sobel_weighted
    - rgb_th_equalization/variance_llvip_superpixel
    
export:
  # Tab-qualified plot names: <tab_id>/<plot_name>. Names without prefix
  # are interpreted as belonging to the preset's top-level tab.
  plots:
    - train_compare/PR Curve
    - train_compare/mAP50          # scatter: methods on X, mAP50 on Y
    - train_compare/mAP50-95
    - train_compare/precision
    - train_compare/recall
    - variance_compare/PR Curve

  # CSV column subset. Omit/empty = all columns.
  # The 'mean'/'std' rows for variance groups are always appended automatically.
  columns:
    - Label
    - Group Key
    - P
    - R
    - mAP50
    - mAP50-95
    - Best epoch (index)  # en p90 esta celda sale '-' (no aplica como percentil)

  # Table formats. Subset of {csv, txt, tex, html}. [] = no tables, missing = all four.
  table_formats: [tex]

  # Plot formats. Subset of {png, pdf}. [] = no plots, missing = png only.
  plot_formats: [pdf]

  # Languages for CSV header/label translation. Omit = use GUI config default.
  languages: [en] # [es, en]

  # Base output path (no extension). GUI pre-fills the Save dialog with this.
  # CLI uses it directly + appends "_<mode>" suffix.
  filename: llvip_all

  labels:
    "SSIM_V2": "SSIM"
    "CURVELET": "Curvelet"
    "CURVELET_MAX": "Curvelet Max"
    "WAVELET": "Wavelet"
    "WAVELET_MAX": "Wavelet Max"
    "SOBEL_WEIGHTED": "Sobel Weighted"
    "SUPERPIXEL": "Superpixel"
