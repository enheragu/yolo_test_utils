# KAIST night — top-6 fusion combinations by mAP50 (best mode)
# Selected from kaist_night_all_best.tex: max 6 plots in the PR curve.

version: 1
tab: train_compare
mode: [best, p90]
show_trials: true
class: all

selection:
  datasets: []

  # Top 6 by mAP50 (raw, across all equalizations):
  #   1. rgb_equalization/variance_kaist_fa_night            mAP50=0.8290
  #   2. th_equalization/variance_kaist_superpixel_night     mAP50=0.8057
  #   3. no_equalization/variance_kaist_pca_night            mAP50=0.8014
  #   4. th_equalization/variance_kaist_wavelet_max_night    mAP50=0.7998
  #   5. th_equalization/variance_kaist_ssim_v2_night        mAP50=0.7937
  #   6. th_equalization/variance_kaist_curvelet_night       mAP50=0.7906
  variance_groups:
    - rgb_equalization/variance_kaist_fa_night
    - th_equalization/variance_kaist_superpixel_night
    - no_equalization/variance_kaist_pca_night
    - th_equalization/variance_kaist_wavelet_max_night
    - th_equalization/variance_kaist_ssim_v2_night
    - th_equalization/variance_kaist_curvelet_night
    - variance_compare/PR Curve

export:
  plots:
    - train_compare/PR Curve     # precision-recall curve (p90 envelope when mode=p90)

  columns:
    - Label
    - Group Key
    - P
    - R
    - mAP50
    - mAP50-95
    - Best epoch (index)   # in p90 mode this cell is '-'

  table_formats: [tex]
  plot_formats: [pdf]
  languages: [es, en]

  filename: kaist_night_focus

  labels:
    "SSIM_V2": "SSIM"
    "CURVELET": "Curvelet"
    "CURVELET_MAX": "Curvelet Max"
    "WAVELET": "Wavelet"
    "WAVELET_MAX": "Wavelet Max"
    "SOBEL_WEIGHTED": "Sobel Weighted"
    "SUPERPIXEL": "Superpixel"
